services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: gardener
      POSTGRES_USER: gardener
      POSTGRES_PASSWORD: gardener
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gardener -d gardener"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-local}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-localpass123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-local} ${MINIO_ROOT_PASSWORD:-localpass123};
      mc mb --ignore-existing local/${OBJECT_STORAGE_BUCKET:-gardener-analysis};
      exit 0;
      "

volumes:
  postgres-data:
  minio-data:
