name: checks

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  foundation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gardener
          POSTGRES_USER: gardener
          POSTGRES_PASSWORD: gardener
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gardener -d gardener"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --python 3.12 --all-packages --all-groups
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir frontend exec playwright install --with-deps chromium
      - run: make check

